name: CV Submission Check

"on":
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  statuses: write

env:
  DEADLINE_UTC: "2026-05-17T21:59:00Z"
  TEMPLATE_REPOSITORY: "bluehawana/cv-workshop"

jobs:
  check-and-reward:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for TeX and PDF files
        id: check_files
        run: |
          TEX_COUNT=$(find . -maxdepth 2 -name "*.tex" | wc -l | tr -d ' ')
          PDF_COUNT=$(find . -maxdepth 2 -name "*.pdf" | wc -l | tr -d ' ')
          echo "tex_count=$TEX_COUNT" >> "$GITHUB_OUTPUT"
          echo "pdf_count=$PDF_COUNT" >> "$GITHUB_OUTPUT"
          echo "Found $TEX_COUNT TeX file(s)"
          echo "Found $PDF_COUNT PDF file(s)"

      - name: Check workshop deadline
        id: deadline
        run: |
          NOW=$(date -u +%s)
          END=$(date -u -d "$DEADLINE_UTC" +%s)
          if [ "$NOW" -le "$END" ]; then
            echo "before_deadline=true" >> "$GITHUB_OUTPUT"
            echo "Challenge is still open"
          else
            echo "before_deadline=false" >> "$GITHUB_OUTPUT"
            echo "Challenge deadline has passed"
          fi

      - name: Verify this is the participant fork
        id: repo_check
        run: |
          if [ "$GITHUB_REPOSITORY" = "$TEMPLATE_REPOSITORY" ]; then
            echo "participant_repo=false" >> "$GITHUB_OUTPUT"
            echo "This is the template repo. Direct pushes or PRs here do not count."
          else
            echo "participant_repo=true" >> "$GITHUB_OUTPUT"
            echo "This is a participant repo: $GITHUB_REPOSITORY"
          fi

      - name: Status - template repo does not count
        if: steps.repo_check.outputs.participant_repo != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              description: 'Fork this repo first. Direct pushes or PRs to the template do not count.',
              context: 'CV Workshop / Submission'
            });

      - name: Status - not complete yet
        if: steps.repo_check.outputs.participant_repo == 'true' && steps.deadline.outputs.before_deadline == 'true' && (steps.check_files.outputs.tex_count == '0' || steps.check_files.outputs.pdf_count == '0')
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              description: 'Almost there - push both your .tex and compiled .pdf.',
              context: 'CV Workshop / Submission'
            });

      - name: Status - deadline passed
        if: steps.repo_check.outputs.participant_repo == 'true' && steps.deadline.outputs.before_deadline != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              description: 'Challenge expired - knowledge-sharing group invite is no longer issued.',
              context: 'CV Workshop / Submission'
            });

      - name: Status - complete, post knowledge-sharing group link
        if: steps.repo_check.outputs.participant_repo == 'true' && steps.deadline.outputs.before_deadline == 'true' && steps.check_files.outputs.tex_count != '0' && steps.check_files.outputs.pdf_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const telegramUrl = 'https://t.me/+kvfCBofvxek2YTBk';

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              description: `Done! Join the knowledge-sharing group: ${telegramUrl}`,
              target_url: telegramUrl,
              context: 'CV Workshop / Submission'
            });

            const body = [
              '## Workshop complete',
              '',
              'Your GitHub repo now contains both your `.tex` source and compiled `.pdf`.',
              '',
              '### Join the knowledge-sharing group',
              '',
              `[Click to join: t.me/+kvfCBofvxek2YTBk](${telegramUrl})`,
              '',
              'Nordic job search community - referrals - CV review - ongoing updates'
            ].join('\n');

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body
            });
